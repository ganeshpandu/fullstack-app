name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  # 📦 Checkout Job
  checkout:
    runs-on: self-hosted

    outputs:
      artifact-name: repo-files

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Upload Source Code
        uses: actions/upload-artifact@v4
        with:
          name: repo-files
          path: .


  # 🐳 Build & Push Job
  build-and-push:
    runs-on: self-hosted
    needs: checkout

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Download Source Code
        uses: actions/download-artifact@v4
        with:
          name: repo-files

      - name: Set Image Tag
        id: meta
        run: echo "tag=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build & Push Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/backend:${{ steps.meta.outputs.tag }} ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/backend:${{ steps.meta.outputs.tag }}

      - name: Build & Push Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:${{ steps.meta.outputs.tag }} ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend:${{ steps.meta.outputs.tag }}


  # 🚀 Deploy Job
  deploy:
    runs-on: self-hosted
    needs: build-and-push

    steps:
      - name: Download Source Code
        uses: actions/download-artifact@v4
        with:
          name: repo-files

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config

      - name: Update Image Tags in Manifests
        run: |
          sed -i "s|backend:.*|backend:${{ needs.build-and-push.outputs.image_tag }}|" k8s/backend-deployment.yaml
          sed -i "s|frontend:.*|frontend:${{ needs.build-and-push.outputs.image_tag }}|" k8s/frontend-deployment.yaml

      - name: Apply Kubernetes Manifests
        run: kubectl apply -f k8s/


  # 🔁 Verify Job
  verify:
    runs-on: self-hosted
    needs: deploy

    steps:
      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config

      - name: Verify Backend Rollout
        run: kubectl rollout status deployment/backend

      - name: Verify Frontend Rollout
        run: kubectl rollout status deployment/frontend
